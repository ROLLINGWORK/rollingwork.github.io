    <style>
      #body{ font-family: 'Montserrat', sans-serif; } 
      input[type='range']::-moz-range-track { background: none; } 
      input[type='range']::-moz-range-thumb { -moz-appearance: none; width: 1.5rem; height: 1.5rem; border-radius: 0.25rem; border: none; background: #000001; z-index: 3; cursor: pointer; } 
      input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; width: 1.5rem; height: 1.5rem; border-radius: 0.25rem; border: none; background: #000001; z-index: 3; cursor: pointer; } 
      
      .textColor{ color:#000000 !important } 
      main p { color: #000000 !important; }

      #cta { 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        text-decoration: none; 
        min-height: 3.5rem;
        background-color: rgb(0, 0, 1) !important;
      }
      
      /* 2. SIGNATURE ORANGE FOR SAVE CONTACT TEXT */
      #cta p { 
        color: #EF4C23 !important; 
        margin: 0 !important; 
        padding: 0 !important;
        font-weight: bold;
        text-transform: uppercase;
      }

      /* 3. CHANGE ALL SVG ICONS TO SIGNATURE ORANGE */
      .icon svg path, 
      .icon svg circle, 
      .icon svg ellipse, 
      .icon svg line,
      .icon svg polyline,
      .icon svg polygon {
        stroke: #EF4C23 !important;
      }

      /* Fix for Instagram and filled icons */
      .icon svg [style*="fill:#fff"], 
      .icon svg [style*="fill:#ffffff"],
      path[style*="fill:#fff"] {
        fill: #EF4C23 !important;
        stroke: none !important;
      }

      .cardColor{ color:#222 !important } 
      .seekbarColor{ background:#00000180 !important }
      #logo { max-width: 90%; height: auto; display: block; margin: 3rem auto; }
    </style> 
    <link rel="stylesheet" href="./vcard.css">
