<!DOCTYPE html>
<html lang="en" style="background-color: rgb(239, 76, 35);">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    
    <title>ROLLING WORK Digital Business Card</title>
    
    <style>
        #body { font-family: 'Montserrat', sans-serif; }
        .textColor { color: #000000 !important; }
        #logo { max-width: 90%; height: auto; display: block; margin: 3rem auto; }
        
        /* SIGNATURE ORANGE FOR SAVE CONTACT TEXT */
        #cta p { 
            color: #EF4C23 !important; 
            margin: 0 !important; 
            padding: 0 !important;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* CHANGE ALL ICONS FROM WHITE TO SIGNATURE ORANGE */
        .icon svg, 
        .icon path, 
        .icon circle, 
        .icon ellipse {
            stroke: #EF4C23 !important;
            fill: none;
        }

        /* SPECIAL FIX FOR INSTAGRAM ICON FILL */
        .actionBtn svg path {
            fill: #EF4C23 !important;
            stroke: none !important;
        }

        #cta { 
            background-color: #000000 !important;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-decoration: none; 
            min-height: 3.5rem;
            margin: 20px;
        }
    </style>
    <link rel="stylesheet" href="./vcard.css">
</head>
