<style>
  #body { font-family: 'Montserrat', sans-serif; } 
  
  /* 1. Reset: Remove unintentional backgrounds/borders from all icons */
  .icon svg {
    fill: none !important;
    background: none !important;
    border: none !important;
  }

  /* 2. Style Line-based Icons (Phone, Email, Website) */
  .icon svg path, 
  .icon svg circle, 
  .icon svg ellipse,
  .icon svg line {
    stroke: #EF4C23 !important; /* Signature Orange */
    fill: none !important;
  }

  /* 3. Style Solid-based Icons (Instagram) */
  /* This targets the specific Instagram path and ensures it is visible */
  .actionBtn a[aria-label="Instagram"] .icon svg path,
  .icon svg path[style*="fill:#fff"],
  .icon svg path[style*="fill:#ffffff"] {
    fill: #EF4C23 !important;
    stroke: none !important;
  }

  /* 4. Contact Button Styling */
  .textColor { color: #000000 !important; } 
  main p { color: #000000 !important; }

  #cta { 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    text-decoration: none; 
    min-height: 3.5rem;
    background-color: #000000 !important; /* Black background */
  }
  
  #cta p { 
    color: #EF4C23 !important; /* Signature Orange text */
    margin: 0 !important; 
    padding: 0 !important;
    font-weight: bold;
    text-transform: uppercase;
  }

  #logo { max-width: 90%; height: auto; display: block; margin: 3rem auto; }
</style>
