<!DOCTYPE html>
<html lang="en" style="background-color: rgb(239, 76, 35);">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <meta name="robots" content="noindex, nofollow"> 
    <meta property="og:title" content="Dan Watkins's Digital Business Card"> 
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <title>ROLLING WORK Digital Business Card</title> 

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
      #body{ font-family: 'Montserrat', sans-serif; } 
      
      /* 3. ORANGE ICONS FIX & REMOVE BOX OUTLINES */
      .icon svg { fill: none !important; background: none !important; border: none !important; }
      
      /* Target line-based icons */
      .icon svg path, .icon svg circle, .icon svg ellipse, .icon svg line {
        stroke: #EF4C23 !important; /* Signature Orange */
        fill: none !important;
      }

      /* Instagram Icon Specific Fill Fix */
      .actionBtn a[aria-label="Instagram"] .icon svg path,
      .icon svg path[style*="fill:#fff"],
      .icon svg path[style*="fill:#ffffff"] {
        fill: #EF4C23 !important;
        stroke: none !important;
      }

      .textColor{ color:#000000 !important } 
      main p { color: #000000 !important; }

      /* 4. BLACK BUTTON WITH ORANGE TEXT */
      #cta { 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        text-decoration: none; 
        min-height: 3.5rem;
        background-color: #000000 !important;
        margin: 20px;
      }
      #cta p { 
        color: #EF4C23 !important; 
        margin: 0 !important; 
        padding: 0 !important;
        font-weight: bold;
        text-transform: uppercase;
      }

      #logo { max-width: 90%; height: auto; display: block; margin: 3rem auto; }
      .cardColor{ color:#222 !important } 
    </style> 
    <link rel="stylesheet" href="./vcard.css">
</head> 
<body id="body">
    <div id="modal" style="background-color: rgb(239, 76, 35); visibility: hidden; top: 2rem; opacity: 0;">
        <a id="close" class="closeColor"><div class="icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:2"><path style="fill:none" d="M0 0h24v24H0z"></path><path d="M18 6 6 18M6 6l12 12" style="fill:none;fill-rule:nonzero;stroke:#fff;stroke-width:2px"></path></svg></div></a> 
        <div id="copyView">
            <p class="textColor">Copy and send the URL to share my Business Card</p> 
            <button id="copyURL" style="background-color: rgb(0, 0, 1);">
                <span class="iconColor" style="color:#EF4C23;">Copy URL</span>
            </button>
        </div> 
        <div id="qrView" class="textColor">
            <div id="qr"></div> 
            <h3>Scan the QR Code</h3> 
        </div>
    </div> 

    <header>
        <div id="topActions" style="display: flex; justify-content: flex-end; padding: 10px;">
            <a id="share" style="margin-right: 15px; cursor:pointer; font-size: 12px; font-weight: bold;">SHARE</a>
            <a id="showQR" style="cursor:pointer; font-size: 12px; font-weight: bold;">QR CODE</a>
        </div> 
        <div class="headerImgC"><img id="logo" src="./logo.png" alt="Logo"></div>
    </header> 

    <main style="background-color: rgb(239, 76, 35); margin-top: 0px; text-align: center;">
        <div id="info" class="textColor">
            <p style="font-weight: bold; font-size: 1.5rem; margin-bottom: 5px;">Dan Watkins</p> 
            <p style="font-weight: bold;">ROLLING WORK</p> 
            <p>Lennox Head NSW</p>
        </div> 
        <p class="sub textColor" style="margin: 15px 0; font-size: 14px;">Carpentry – Home Maintenance</p> 
        
        <a id="cta" rel="noreferrer" download="" target="_blank" href="danwatkins.vcf">
            <p>Save Contact</p>
        </a> 

        <div class="actions" style="display: flex; justify-content: space-around; flex-wrap: wrap; margin-top: 20px;">
            <div class="actionBtn">
                <a href="tel:+61404508880" style="background-color: #000; display: flex; justify-content: center; align-items: center; width: 60px; height: 60px; border-radius: 8px; margin: 0 auto;">
                    <div class="icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.27 11.72 11.72 0 003.7.59 1 1 0 011 1V20a1 1 0 01-1 1A19 19 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11.72 11.72 0 00.59 3.7 1 1 0 01-.27 1.11z" fill="none" stroke="#fff" stroke-width="2"/></svg></div>
                </a>
                <p style="font-size: 11px; margin-top: 8px;">Mobile</p>
            </div>
            <div class="actionBtn">
                <a href="mailto:dan@rollingwork.com" style="background-color: #000; display: flex; justify-content: center; align-items: center; width: 60px; height: 60px; border-radius: 8px; margin: 0 auto;">
                    <div class="icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5" fill="none" stroke="#fff" stroke-width="2"/></svg></div>
                </a>
                <p style="font-size: 11px; margin-top: 8px;">Email</p>
            </div>
            <div class="actionBtn">
                <a href="https://instagram.com/_rollingwork" target="_blank" style="background-color: #000; display: flex; justify-content: center; align-items: center; width: 60px; height: 60px; border-radius: 8px; margin: 0 auto;">
                    <div class="icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="#fff" stroke-width="2" fill="none"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z" stroke="#fff" stroke-width="2" fill="none"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke="#fff" stroke-width="2" fill="none"/></svg></div>
                </a>
                <p style="font-size: 11px; margin-top: 8px;">Instagram</p>
            </div>
        </div> 
    </main> 

    <script src="./qrcode.min.js"></script>
    <script>
        let m=document.getElementById("modal"),c=document.getElementById("close"),cv=document.getElementById("copyView"),curl=document.getElementById("copyURL"),qrv=document.getElementById("qrView"),qr=document.getElementById("qr"),s=document.getElementById("share"),sqr=document.getElementById("showQR");
        function tC(e){"2rem"==e.style.top?(e.style.visibility="visible",e.style.top="0px",e.style.opacity=1):(e.style.top="2rem",e.style.opacity=0,setTimeout(()=>{e.style.visibility="hidden"},200))}
        window.addEventListener("load",()=>{
            if(qr && typeof QRCode !== 'undefined') qr.innerHTML=new QRCode({content:window.location.href,container:"svg-viewbox",join:!0,ecl:"L",padding:0}).svg()
        });
        if(s) s.addEventListener("click",()=>{navigator.share({title:document.title,url:window.location.href})});
        if(sqr) sqr.addEventListener("click",()=>{tC(m)});
        if(c) c.addEventListener("click",()=>tC(m));
    </script>
</body>
</html>
