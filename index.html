<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Watkins - Rolling Work</title>
    <style>
        body { 
            background-color: #ef4c23; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #000000;
        }
        
        #logo { 
            max-width: 85%; 
            height: auto; 
            margin: 40px auto 20px;
        }

        #info {
            text-align: center;
            margin-bottom: 30px;
        }

        .name { font-size: 28px; font-weight: 800; margin: 0; text-transform: uppercase; }
        .bizname { font-size: 18px; font-weight: 600; margin: 5px 0; }
        .bizaddr { font-size: 16px; margin: 0; }
        .sub { font-size: 16px; font-weight: 500; margin-top: 15px; border-top: 1px solid #000; padding-top: 10px; width: 200px; margin-left: auto; margin-right: auto; }

        /* THE FIX: Custom Save Contact Button */
        .save-btn {
            background-color: #000000;
            color: #ffffff !important;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            margin: 20px 0 40px;
            transition: transform 0.2s;
            border: none !important;
            box-shadow: none !important;
        }
        
        /* Ensures the icon inside the button has NO box or border */
        .save-btn svg {
            margin-right: 12px;
            border: none !important;
            background: none !important;
            outline: none !important;
        }

        .actions {
            display: flex;
            gap: 25px;
            margin-bottom: 40px;
        }

        .action-circle {
            background-color: #000000;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }

        .action-item p { margin-top: 8px; }

        .insta-link {
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <img id="logo" src="./logo.png" alt="Rolling Work Logo">

    <div id="info">
        <p class="name">Dan Watkins</p>
        <p class="bizname">ROLLING WORK</p>
        <p class="bizaddr">Lennox Head NSW</p>
        <p class="sub">Carpentry – Home Maintenance</p>
    </div>

    <a href="danwatkins.vcf" class="save-btn" download>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line>
            <line x1="23" y1="11" x2="17" y2="11"></line>
        </svg>
        SAVE CONTACT
    </a>

    <div class="actions">
        <div class="action-item">
            <a href="tel:+61404508880" class="action-circle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </a>
            <p>MOBILE</p>
        </div>
        <div class="action-item">
            <a href="mailto:dan@rollingwork.com" class="action-circle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </a>
            <p>EMAIL</p>
        </div>
        <div class="action-item">
            <a href="https://www.rollingwork.com" target="_blank" class="action-circle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            </a>
            <p>WEBSITE</p>
        </div>
    </div>

    <a href="https://instagram.com/_rollingwork" target="_blank" class="insta-link">INSTAGRAM</a>

</body>
</html>
